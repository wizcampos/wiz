name: app-build-deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - "app/**"
      - "Dockerfile"
      - "requirements.txt"
      - "k8s/**"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: clgcporg10-178
  REGION: us-east1
  REPO: wiz-repo
  IMAGE: exposure-scanner
  CLUSTER: wiz-gke-cluster
  CLUSTER_REGION: us-east1
  K8S_DIR: k8s

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Auth to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: |
          gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          TAG="${GITHUB_SHA::7}"
          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${IMAGE}:${TAG}"
          docker build -t "${IMAGE_URI}" .
          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Push image
        run: |
          docker push "${IMAGE_URI}"

      - name: Get image digest
        run: |
          DIGEST="$(gcloud artifacts docker images describe "${IMAGE_URI}" --format='value(image_summary.digest)')"
          echo "DIGEST=${DIGEST}" >> $GITHUB_ENV
          echo "IMAGE_BY_DIGEST=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${IMAGE}@${DIGEST}" >> $GITHUB_ENV

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.CLUSTER_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy with Kustomize using digest
        run: |
          cd "${K8S_DIR}"
          kubectl apply -k .

          # Force the deployment to use the immutable digest (safer + plays nicer with Binary Auth)
          kubectl set image deployment/exposure-scanner \
            exposure-scanner="${IMAGE_BY_DIGEST}"

          kubectl rollout status deployment/exposure-scanner --timeout=180s