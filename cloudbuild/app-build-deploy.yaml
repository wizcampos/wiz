substitutions:
  _REGION: "us-east1"
  _PROJECT_ID: "clgcporg10-178"
  _REPO: "wiz-repo"
  _IMAGE: "exposure-scanner"
  _CLUSTER: "wiz-gke-cluster"
  _CLUSTER_REGION: "us-east1"
  _NAMESPACE: "default"
  _K8S_DIR: "k8s"
  _ATTESTOR: "wiz-attestor"
  _KMS_LOCATION: "us-east1"
  _KMS_KEYRING: "binauthz-keyring"
  _KMS_KEY: "image-signing-key"
  _KMS_KEY_VERSION: "1"

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "docker-build"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    id: "docker-push"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "resolve-digest"
    entrypoint: "bash"
    args:
      - "-lc"
      - |
        set -euo pipefail
        DIGEST=$(gcloud artifacts docker images describe \
          ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA} \
          --format="value(image_summary.digest)")
        echo "DIGEST=${DIGEST}" | tee /workspace/digest.env

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "binauthz-attest"
    entrypoint: "bash"
    args:
      - "-lc"
      - |
        set -euo pipefail
        source /workspace/digest.env
        IMAGE_URL="${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_IMAGE}@${DIGEST}"
        echo "Attesting: ${IMAGE_URL}"
        bash cloudbuild/scripts/binauthz-attest.sh "${IMAGE_URL}" \
          "${_PROJECT_ID}" "${_ATTESTOR}" \
          "${_KMS_LOCATION}" "${_KMS_KEYRING}" "${_KMS_KEY}" "${_KMS_KEY_VERSION}"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "deploy"
    entrypoint: "bash"
    args:
      - "-lc"
      - |
        set -euo pipefail
        source /workspace/digest.env
        IMAGE_URL="${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_IMAGE}@${DIGEST}"

        gcloud container clusters get-credentials "${_CLUSTER}" --region "${_CLUSTER_REGION}" --project "${_PROJECT_ID}"

        # If you’re using Kustomize (recommended)
        # This updates the image in kustomize and applies.
        cd ${_K8S_DIR}
        kustomize edit set image exposure-scanner=${IMAGE_URL}
        kubectl apply -k .

        kubectl rollout status deployment/exposure-scanner -n ${_NAMESPACE} --timeout=180s

options:
  logging: CLOUD_LOGGING_ONLY