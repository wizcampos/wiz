substitutions:
  _REGION: "us-east1"
  _CLUSTER: "wiz-gke-cluster"
  _AR_REPO: "wiz-repo"
  _IMAGE: "exposure-scanner"
  _NAMESPACE: "default"
  _ATTESTOR: "projects/${PROJECT_ID}/attestors/wiz-attestor"
  _KMS_LOCATION: "us-east1"
  _KMS_KEYRING: "binauthz-keyring"
  _KMS_KEY: "image-signing-key"
  _KMS_KEY_VERSION: "1"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "Build"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:${SHORT_SHA}"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    id: "Push"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:${SHORT_SHA}"

  - name: "gcr.io/cloud-builders/gcloud"
    id: "Resolve Digest"
    entrypoint: "bash"
    args:
      - "-lc"
      - |
        set -euo pipefail
        DIGEST=$(gcloud artifacts docker images describe \
          ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:${SHORT_SHA} \
          --format="value(image_summary.digest)")
        echo "Resolved digest: ${DIGEST}"
        echo -n "${DIGEST}" > /workspace/IMAGE_DIGEST.txt

  - name: "gcr.io/cloud-builders/gcloud"
    id: "Binary Auth Attest (Optional)"
    entrypoint: "bash"
    args:
      - "-lc"
      - |
        set -euo pipefail
        if [[ -z "${_ATTESTOR}" ]]; then
          echo "No _ATTESTOR set; skipping attestation."
          exit 0
        fi

        chmod +x cloudbuild/scripts/binauth-attest.sh
        DIGEST="$(cat /workspace/IMAGE_DIGEST.txt)"
        IMAGE_URL="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}@${DIGEST}"

        cloudbuild/scripts/binauth-attest.sh \
          "${IMAGE_URL}" \
          "${_ATTESTOR}" \
          "${PROJECT_ID}" \
          "${_KMS_LOCATION}" \
          "${_KMS_KEYRING}" \
          "${_KMS_KEY}" \
          "${_KMS_KEY_VERSION}"

  - name: "gcr.io/cloud-builders/gcloud"
    id: "Deploy"
    entrypoint: "bash"
    args:
      - "-lc"
      - |
        set -euo pipefail
        DIGEST="$(cat /workspace/IMAGE_DIGEST.txt)"
        IMAGE_URL="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}@${DIGEST}"

        echo "Getting credentials for ${_CLUSTER}..."
        gcloud container clusters get-credentials "${_CLUSTER}" --region "${_REGION}" --project "${PROJECT_ID}"

        echo "Applying kustomize base..."
        kubectl apply -k k8s

        echo "Updating deployment image to digest..."
        kubectl -n "${_NAMESPACE}" set image deployment/exposure-scanner \
          exposure-scanner="${IMAGE_URL}"

        kubectl -n "${_NAMESPACE}" rollout status deployment/exposure-scanner --timeout=180s

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:${SHORT_SHA}"